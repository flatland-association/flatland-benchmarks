services:
  postgres:
    image: postgres:15
    hostname: postgres
    env_file: .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - ${POSTGRES_PORT}:5432
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready", "-d", "${POSTGRES_DB}" ]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s
    networks:
      - flatland-benchmarks
      # If persistent storage is required, uncomment volumes list:
      # volumes:
      # - ${POSTGRES_VOLUME:-flatland-benchmarks-postgres}:/var/lib/postgresql/data:delegated

  pgadmin:
    profiles: [ tsdev, tsdevwithorchestrators, full ]
    image: dpage/pgadmin4
    hostname: pgadmin
    env_file: .env
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
      - PGADMIN_LISTEN_PORT=${PGADMIN_LISTEN_PORT}
      - PGADMIN_LISTEN_ADDRESS=0.0.0.0
    ports:
      - ${PGADMIN_LISTEN_PORT}:${PGADMIN_LISTEN_PORT}
    volumes:
      - ${PGADMIN_VOLUME:-flatland-benchmarks-pgadmin}:/var/lib/pgadmin:delegated
    networks:
      - flatland-benchmarks

  flyway:
    image: flyway/flyway
    command: -url=jdbc:postgresql://postgres:5432/${POSTGRES_DB} -schemas=public -user=${POSTGRES_USER} -password=${POSTGRES_PASSWORD} migrate  -connectRetries=60 -baselineOnMigrate=true
    volumes:
      - ./ts/backend/src/migration/schema:/flyway/sql/schema
      - ./ts/backend/src/migration/data:/flyway/sql/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - flatland-benchmarks

  keycloak:
    profiles: [ tsdev, tsdevwithorchestrators, full ]
    image: keycloak/keycloak:26.6.2
    hostname: keycloak
    # as we need to access keycloak from backend Docker container under docker internal port, we need to start Keycloak on configured port, port forwarding in Docker run is not enough
    command:
      start-dev --import-realm --http-port ${KEYCLOAK_PORT:-8081} --hostname localhost
    ports:
      - ${KEYCLOAK_PORT:-8081}:${KEYCLOAK_PORT:-8081}
      - ${KEYCLOAK_HTTPS_PORT:-8443}:8443
    volumes:
      # TODO can we avoid copying the realm config? Download in an init container from the repo....?
      - ./docker/keycloak/flatland-realm.json:/opt/keycloak/data/import/flatland-realm.json
      - ./docker/keycloak/certs:/opt/keycloak/dev/certs
      # persist data, otherwise restarting the container nills JWTs
      - ${KEYCLOAK_VOLUME:-flatland-benchmarks-keycloak}:/opt/keycloak/data/:delegated
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=flatland
      - KC_HTTPS_CERTIFICATE_FILE=/opt/keycloak/dev/certs/keycloak-server.crt.pem
      - KC_HTTPS_CERTIFICATE_KEY_FILE=/opt/keycloak/dev/certs/keycloak-server.key.pem
      - PROXY_ADDRESS_FORWARDING=true
      - KEYCLOAK_LOGLEVEL=DEBUG
      - KC_HEALTH_ENABLED=true
      - KC_METRICS_ENABLED=true
      - KC_HTTP_MANAGEMENT_SCHEME=http # do not inherit https
      # https://www.keycloak.org/server/logging#_log_levels
      # https://www.keycloak.org/server/logging#http-access-logging
    #      - KC_LOG_LEVEL=DEBUG
    #      - KC_LOG_CONSOLE_OUTPUT=json
    networks:
      - flatland-benchmarks
    healthcheck:
      test: [
        "CMD-SHELL",
        # https://www.keycloak.org/observability/health#_healthcheck
        "{ printf 'HEAD /health/ready HTTP/1.0\r\n\r\n' >&0; grep 'HTTP/1.0 200'; } 0<>/dev/tcp/localhost/9000"
      ]
      interval: 5s
      timeout: 20s
      retries: 50

  rabbit:
    build:
      context: docker/rabbitmq
      args:
        - WORKER_CONNECTION_TIMEOUT=${WORKER_CONNECTION_TIMEOUT}
    hostname: rabbit
    env_file: .env
    environment:
      - http_proxy=${RABBITMQ_HTTP_PROXY}
      - https_proxy=${RABBITMQ_HTTPS_PROXY}
      - no_proxy=${RABBITMQ_NO_PROXY}
    ports:
      - ${RABBITMQ_MANAGEMENT_PORT:-15672}:15672
      - ${RABBITMQ_TLS_PORT}:5671
      - ${RABBITMQ_PORT}:5672
    restart: unless-stopped
    logging:
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: rabbitmqctl status
      interval: 20s
      timeout: 10s
      retries: 30
    volumes:
      # https://www.rabbitmq.com/docs/ssl#automated-certificate-generation tls-gen -> test/basic.sh
      - ./docker/rabbitmq/certs:/cert_rabbitmq
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.config
    networks:
      - flatland-benchmarks

  minio:
    hostname: minio
    image: "minio/minio:RELEASE.2024-11-07T00-52-20Z"
    restart: on-failure
    ports:
      - "${MINIO_PORT}:${MINIO_PORT}"
      - "${MINIO_CONSOLE_PORT}:${MINIO_CONSOLE_PORT}"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    healthcheck:
      test: [ "CMD", "bash", "-c", "curl -v --fail 127.0.0.1:${MINIO_PORT}/minio/health/ready" ]
      interval: 5s
      timeout: 1s
      retries: 5
    command: server /data --address :${MINIO_PORT} --console-address :${MINIO_CONSOLE_PORT}
    logging:
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - flatland-benchmarks

  minio_setup:
    image: minio/mc:RELEASE.2024-11-05T11-29-45Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: [ "/bin/bash","-c" ]
    command:
      - |
        set -euxo pipefail

        /usr/bin/mc config host add myminio http://minio:${MINIO_PORT} ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}

        # do not fail if bucket already exists:
        /usr/bin/mc mb myminio/${S3_BUCKET} || true

        echo "createbuckets successful"
    networks:
      - flatland-benchmarks

  minio_trace:
    image: minio/mc:RELEASE.2024-11-05T11-29-45Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: [ "/bin/bash","-c" ]
    command:
      - |
        set -euxo pipefail
        /usr/bin/mc config host add myminio http://minio:${MINIO_PORT} ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}
        /usr/bin/mc admin trace -v myminio
    logging:
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - flatland-benchmarks

  # without profile, make sure setup services (flyway migration etc.) have completed before we're up
  wait-setups:
    image: busybox
    depends_on:
      flyway:
        condition: service_completed_successfully
      minio_setup:
        condition: service_completed_successfully
    entrypoint: [ "sh", "-c" ]
    command:
      - sleep 99999


  fab-backend:
    profiles: [ full ]
    # TODO add switch to use pre-built image or local build
    #image: ghcr.io/flatland-association/fab-backend:latest
    #pull_policy: always
    build:
      dockerfile: deployment/backend/Dockerfile
    # POSTGRES_ variables are required for flyway
    env_file: .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - CUSTOMIZATION=fab
      # https://prometheus.io/docs/guides/opentelemetry/#enable-the-otlp-receiver
      # https://www.npmjs.com/package/@opentelemetry/sdk-node
      # https://github.com/open-telemetry/opentelemetry-specification/blob/main/specification/protocol/exporter.md#configuration-options
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://jaeger:4318/v1/traces
      - OTEL_METRICS_EXPORTER=prometheus
      - OTEL_EXPORTER_OTLP_METRICS_ENDPOINT=http://prometheus:9090/api/v1/otlp
    depends_on:
      rabbit:
        condition: service_healthy
      postgres:
        condition: service_healthy
      # workaround for docker compose waiting for flyway although exited with 0 https://forums.docker.com/t/behavior-of-up-wait-changed/147699/4
      flyway:
        condition: service_completed_successfully
    volumes:
      - ./docker/config-demo.jsonc:/usr/src/app/dist/backend/config/config.jsonc
      #      # comment out for local development
      #      - ./dist/backend/app:/usr/src/app/dist/backend/app
      #      - ./node_modules:/usr/src/app/node_modules
      #- ./ts/backend/src/migration/schema:/flyway/sql/schema
      #- ./ts/backend/src/migration/data:/flyway/sql/data
      # reverse proxy to access keycloak via localhost:8081 in backend container
      - ./deployment/backend/nginx.conf:/etc/nginx/http.d/default.conf
      - ./deployment/backend/start_reverseproxy.sh:/flyway/start.sh
      # uncomment one of the two customizations:
      #      - ./ts/backend/src/public.ai4realnet/customization.json:/usr/src/app/dist/backend/public/customization.json
      - ./ts/backend/src/public.fab/customization.json:/usr/src/app/dist/backend/public/customization.json
    entrypoint: bash
    command:
      - /flyway/start.sh
    ports:
      - 8000:8000
    healthcheck:
      test: [ "CMD", "bash", "-c", "wget -qq 127.0.0.1:8000/api-docs" ]
      interval: 5s
      timeout: 1s
      retries: 5
    networks:
      - flatland-benchmarks

  fab-frontend:
    profiles: [ full ]
    # TODO add switch to use pre-built image or local build
    #image: ghcr.io/flatland-association/fab-frontend:latest
    #pull_policy: always
    build:
      dockerfile: deployment/frontend/Dockerfile
    depends_on:
      fab-backend:
        condition: service_healthy
    volumes:
      - ./docker/fab-frontend/additional-entrypoint.sh:/docker-entrypoint.d/frontend-entrypoint.sh:rx
    ports:
      - 80:80
    networks:
      - flatland-benchmarks
    healthcheck:
      test: [ "CMD", "bash", "-c", "curl -v --fail http://127.0.0.1/" ]
      interval: 5s
      timeout: 1s
      retries: 5

  ai4realnet-orchestrator-railway-setup:
    profiles: [ tsdevwithorchestrators, full ]
    image: alpine
    volumes:
      - orchestrator-data:/vol
      - orchestrator-scenarios:/scenarios
    entrypoint: [ "/bin/sh","-c" ]
    command:
      - |
        set -euxo pipefail
        whoami
        chmod a+rwx -R /vol

        chmod a+rwx -R /scenarios
        wget "https://github.com/flatland-association/flatland-scenarios/raw/refs/heads/regen-scenarios-breaking-changes/scenarios/environments_v2.zip" -O environments_v2.zip
        mkdir -p /scenarios
        unzip environments_v2.zip -o -d /scenarios

  ai4realnet-orchestrator-railway:
    profiles: [ tsdevwithorchestrators, full ]
    # https://docs.celeryq.dev/en/stable/reference/cli.html#celery-worker
    # Use --concurrency 2 to specify worker pool size: https://docs.celeryq.dev/en/stable/userguide/workers.html#concurrency
    entrypoint: [ "/bin/bash","-c" ]
    command:
      - |
        set -euxo pipefail
        whoami
        # fail fast checking permissions
        ls -al /app/data
        mkdir -p /app/data/1234/
        touch /app/data/1234/nix.txt
        ls -al /app/scenarios
        mkdir -p /app/scenarios/1234/
        touch /app/scenarios/1234/nix.txt
        cd ai4realnet_orchestrators
        python -m celery -A ai4realnet_orchestrators.railway.orchestrator worker -l info -n orchestrator@%n -Q ${DOMAIN}
    build:
      dockerfile: evaluation/ai4realnet_orchestrators/ai4realnet_orchestrators/railway/integrationtests/Dockerfile
    depends_on:
      rabbit:
        condition: service_healthy
      minio_setup:
        condition: service_completed_successfully
      ai4realnet-orchestrator-railway-setup:
        condition: service_completed_successfully
    volumes:
      - ${COMPUTE_WORKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
      - orchestrator-data:/app/data
      - orchestrator-scenarios:/app/scenarios
      - ./evaluation/ai4realnet_orchestrators/ai4realnet_orchestrators/railway/orchestrator.py:/app/ai4realnet_orchestrators/ai4realnet_orchestrators/railway/orchestrator.py:rx
      - ./evaluation/ai4realnet_orchestrators/ai4realnet_orchestrators/railway/test_runner_kpi_pf_026_railway.py:/app/ai4realnet_orchestrators/ai4realnet_orchestrators/railway/test_runner_kpi_pf_026_railway.py:rx
      - ./evaluation/ai4realnet_orchestrators/ai4realnet_orchestrators/railway/test_runner_kpi_nf_045_railway.py:/app/ai4realnet_orchestrators/ai4realnet_orchestrators/railway/test_runner_kpi_nf_045_railway.py:rx
      - ./evaluation/ai4realnet_orchestrators/ai4realnet_orchestrators/railway/abstract_test_runner_railway.py:/app/ai4realnet_orchestrators/ai4realnet_orchestrators/railway/abstract_test_runner_railway.py:rx
      - ./evaluation/ai4realnet_orchestrators/ai4realnet_orchestrators/railway/integrationtests/orchestrator_definitions.py:/app/ai4realnet_orchestrators/ai4realnet_orchestrators/railway/orchestrator_definitions.py:rx
      - ./docker/rabbitmq/certs:/cert_rabbitmq
    env_file: .env
    environment:
      # required for flyway start.sh:
      - POSTGRES_HOST=${POSTGRES_HOST:-rabbit}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      # Celery configuration:
      - BROKER_URL=amqps://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@${RABBITMQ_HOST}:5671//
      - RABBITMQ_CA_CERTS=/cert_rabbitmq/ca_certificate.pem
      - RABBITMQ_KEYFILE=/cert_rabbitmq/client_localhost_key.pem
      - RABBITMQ_CERTFILE=/cert_rabbitmq/client_localhost_certificate.pem
      - BACKEND_URL=rpc://
      # configuration for fab-clientlib:
      - FAB_API_URL=http://fab-backend:8000
      - CLIENT_SECRET=top-secret
      # use Docker hostname as called from orchestrator run within Docker container:
      - TOKEN_URL=http://keycloak:8081/realms/flatland/protocol/openid-connect/token
      # we use http in fab-backend:
      - OAUTHLIB_INSECURE_TRANSPORT=1
      # data volumes for scenarios (input to submission image) and trajectories (output to submission image)
      - DATA_VOLUME=${COMPOSE_PROJECT_NAME}_orchestrator-data
      - SCENARIOS_VOLUME=${COMPOSE_PROJECT_NAME}_orchestrator-scenarios
    logging:
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: cd ai4realnet_orchestrators && python -m celery -A ai4realnet_orchestrators.railway.orchestrator inspect ping
    networks:
      - flatland-benchmarks

  flatland3-benchmarks-orchestrator-setup:
    profiles: [ tsdevwithorchestrators, full ]
    image: alpine
    volumes:
      - flatland3-benchmarks-scenarios:/scenarios
      - flatland3-benchmarks-data:/vol
    entrypoint: [ "/bin/sh","-c" ]
    command:
      - |
        set -euxo pipefail

        whoami
        chmod a+rwx -R /vol

        chmod a+rwx -R /scenarios
        wget "https://github.com/flatland-association/flatland-scenarios/raw/refs/heads/main/competitions/flatland3/debug-environments.zip" -O debug-environments.zip -O debug-environments.zip
        mkdir -p /scenarios
        unzip debug-environments.zip -o -d /scenarios
        rm -fR /scenarios/Test*
        mv -f /scenarios/debug-environments/Test* /scenarios/

        find /scenarios

  flatland3-benchmarks-orchestrator:
    profiles: [ tsdevwithorchestrators, full ]
    # https://docs.celeryq.dev/en/stable/reference/cli.html#celery-worker
    # Use --concurrency 2 to specify worker pool size: https://docs.celeryq.dev/en/stable/userguide/workers.html#concurrency
    entrypoint: [ "/bin/bash","-c" ]
    command:
      - |
        set -euxo pipefail
        pwd
        python -m pip install -r /app/fab-clientlib/requirements.txt
        python -m celery -A orchestrator worker -l info -n orchestrator@%n -Q f669fb8d-80ac-4ba7-8875-0a33ed5d30b9
    build:
      # install sudo for DinD
      dockerfile: docker/flatland3_benchmarks/orchestrator/Dockerfile
    depends_on:
      rabbit:
        condition: service_healthy
      minio_setup:
        condition: service_completed_successfully
      flatland3-benchmarks-orchestrator-setup:
        condition: service_completed_successfully
    volumes:
      - ${COMPUTE_WORKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
      - ./evaluation/flatland3_benchmarks/orchestrator/orchestrator_docker_compose.py:/app/orchestrator.py
      - ./evaluation/flatland3_benchmarks/orchestrator/orchestrator_common.py:/app/orchestrator_common.py
      - ./evaluation/flatland3_benchmarks/orchestrator/s3_utils.py:/app/s3_utils.py
      - ./fab-clientlib/:/app/fab-clientlib
      - ./docker/rabbitmq/certs:/cert_rabbitmq
      - flatland3-benchmarks-data:/app/data
      - flatland3-benchmarks-scenarios:/app/scenarios
    environment:
      # Celery configuration
      - BENCHMARK_ID=f669fb8d-80ac-4ba7-8875-0a33ed5d30b9
      - TEST_IDS=${TEST_IDS}
      - PERCENTAGE_COMPLETE_THRESHOLD=${PERCENTAGE_COMPLETE_THRESHOLD:-0}
      - RUNNING_TIME_LIMIT=${RUNNING_TIME_LIMIT:-999999999}
      - PYTHONPATH=/app/:/app/fab-clientlib
      - BROKER_URL=amqps://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@${RABBITMQ_HOST}:5671//
      - BACKEND_URL=rpc://
      - RABBITMQ_CA_CERTS=/cert_rabbitmq/ca_certificate.pem
      - RABBITMQ_KEYFILE=/cert_rabbitmq/client_localhost_key.pem
      - RABBITMQ_CERTFILE=/cert_rabbitmq/client_localhost_certificate.pem

      # evaluator configuration
      - BENCHMARKING_NETWORK=${COMPOSE_PROJECT_NAME}_flatland-benchmarks
      - S3_BUCKET=fab-demo-results
      # for backend to S3 communication, use internal docker hostname
      - AWS_ENDPOINT_URL=http://minio:${MINIO_PORT}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - S3_UPLOAD_PATH_TEMPLATE=${S3_UPLOAD_PATH_TEMPLATE}
      - S3_UPLOAD_WITH_SUBMISSION_ID=true
      - S3_UPLOAD_PATH_TEMPLATE_USE_SUBMISSION_ID=${S3_UPLOAD_PATH_TEMPLATE_USE_SUBMISSION_ID}
      - DOCKERCOMPOSE_HOST_DIRECTORY=${PWD}

      # configuration for fab-clientlib:
      - FAB_API_URL=http://fab-backend:8000
      - CLIENT_ID=fab-client-credentials
      - CLIENT_SECRET=top-secret
      # use Docker hostname as called from orchestrator run within Docker container:
      - TOKEN_URL=http://keycloak:8081/realms/flatland/protocol/openid-connect/token
      # we use http in fab-backend:
      - OAUTHLIB_INSECURE_TRANSPORT=1
      # data volumes for scenarios (input to submission image) and trajectories (output to submission image)

      - DATA_VOLUME=${COMPOSE_PROJECT_NAME}_flatland3-benchmarks-data
      - SCENARIOS_VOLUME=${COMPOSE_PROJECT_NAME}_flatland3-benchmarks-scenarios
    logging:
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: celery -A orchestrator inspect ping
    networks:
      - flatland-benchmarks

  # https://github.com/jaegertracing/jaeger/blob/main/examples/hotrod/docker-compose.yml
  # https://www.jaegertracing.io/docs/2.dev/getting-started/
  # https://github.com/jaegertracing/jaeger/tree/v2.19.0/docker-compose/monitor
  jaeger:
    profiles: [ telemetry ]
    image: ${REGISTRY:-}jaegertracing/jaeger:${JAEGER_VERSION:-latest}
    volumes:
      - "./docker/jaeger/config.yaml:/etc/jaeger/config.yml"
    command: [ "--config", "/etc/jaeger/config.yml" ]
    ports:
      - "16686:16686"
      - "16687:16687"
      - "4317:4317"
      - "4318:4318"
    environment:
      - LOG_LEVEL=debug
    networks:
      flatland-benchmarks:
        # This is the host name used in Prometheus scrape configuration.
        aliases: [ spm_metrics_source ]
  # https://github.com/jaegertracing/jaeger/blob/v2.19.0/docker-compose/monitor/docker-compose.yml
  prometheus:
    profiles: [ telemetry ]
    networks:
      - flatland-benchmarks
    image: prom/prometheus:v3.11.1@sha256:759ea6db49103737f2a6f420b0d1632062d8ad99dec086c76db605fd0bf23e15
    volumes:
      - "./docker/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
  # git@github.com:hnamtrg/elk-fullstack-compose.git -> https://www.elastic.co/blog/getting-started-with-the-elastic-stack-and-docker-compose
  # https://stackoverflow.com/questions/62950008/send-logs-with-filebeat-to-logstash
  # https://github.com/gnokoheat/elk-with-filebeat-by-docker-compose
  elk-setup:
    profiles: [ elk ]
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    volumes:
      - elkcerts:/usr/share/elasticsearch/config/certs
    user: "0"
    command: >
      bash -c '
        if [ x${ELASTIC_PASSWORD} == x ]; then
          echo "Set the ELASTIC_PASSWORD environment variable in the .env file";
          exit 1;
        elif [ x${KIBANA_PASSWORD} == x ]; then
          echo "Set the KIBANA_PASSWORD environment variable in the .env file";
          exit 1;
        fi;
        if [ ! -f config/certs/ca.zip ]; then
          echo "Creating CA";
          bin/elasticsearch-certutil ca --silent --pem -out config/certs/ca.zip;
          unzip config/certs/ca.zip -d config/certs;
        fi;
        if [ ! -f config/certs/certs.zip ]; then
          echo "Creating certs";
          echo -ne \
          "instances:\n"\
          "  - name: es01\n"\
          "    dns:\n"\
          "      - es01\n"\
          "      - localhost\n"\
          "    ip:\n"\
          "      - 127.0.0.1\n"\
          "  - name: kibana\n"\
          "    dns:\n"\
          "      - kibana\n"\
          "      - localhost\n"\
          "    ip:\n"\
          "      - 127.0.0.1\n"\
          > config/certs/instances.yml;
          bin/elasticsearch-certutil cert --silent --pem -out config/certs/certs.zip --in config/certs/instances.yml --ca-cert config/certs/ca/ca.crt --ca-key config/certs/ca/ca.key;
          unzip config/certs/certs.zip -d config/certs;
        fi;
        echo "Setting file permissions"
        chown -R root:root config/certs;
        find . -type d -exec chmod 750 \{\} \;;
        find . -type f -exec chmod 640 \{\} \;;
        echo "Waiting for Elasticsearch availability";
        until curl -s --cacert config/certs/ca/ca.crt https://es01:9200 | grep -q "missing authentication credentials"; do sleep 30; done;
        echo "Setting kibana_system password";
        until curl -s -X POST --cacert config/certs/ca/ca.crt -u "elastic:${ELASTIC_PASSWORD}" -H "Content-Type: application/json" https://es01:9200/_security/user/kibana_system/_password -d "{\"password\":\"${KIBANA_PASSWORD}\"}" | grep -q "^{}"; do sleep 10; done;
        echo "All done!";
      '
    healthcheck:
      test: [ "CMD-SHELL", "[ -f config/certs/es01/es01.crt ]" ]
      interval: 1s
      timeout: 5s
      retries: 120

  es01:
    profiles: [ elk ]
    depends_on:
      elk-setup:
        condition: service_healthy
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    labels:
      co.elastic.logs/module: elasticsearch
    volumes:
      - elkcerts:/usr/share/elasticsearch/config/certs
      - esdata01:/usr/share/elasticsearch/data
    ports:
      - ${ES_PORT}:9200
    environment:
      - node.name=es01
      - cluster.name=${CLUSTER_NAME}
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=certs/es01/es01.key
      - xpack.security.http.ssl.certificate=certs/es01/es01.crt
      - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.key=certs/es01/es01.key
      - xpack.security.transport.ssl.certificate=certs/es01/es01.crt
      - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.license.self_generated.type=${LICENSE}
    mem_limit: ${ES_MEM_LIMIT}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s --cacert config/certs/ca/ca.crt https://localhost:9200 | grep -q 'missing authentication credentials'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120

  kibana:
    profiles: [ elk ]
    depends_on:
      es01:
        condition: service_healthy
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
    labels:
      co.elastic.logs/module: kibana
    volumes:
      - elkcerts:/usr/share/kibana/config/certs
      - kibanadata:/usr/share/kibana/data
    ports:
      - ${KIBANA_PORT}:5601
    environment:
      - SERVERNAME=kibana
      - SERVER_SSL_ENABLED=true
      - SERVER_SSL_KEY=config/certs/kibana/kibana.key
      - SERVER_SSL_CERTIFICATE=config/certs/kibana/kibana.crt
      - ELASTICSEARCH_HOSTS=https://es01:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES=config/certs/ca/ca.crt
      - XPACK_SECURITY_ENCRYPTIONKEY=${ENCRYPTION_KEY}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${ENCRYPTION_KEY}
      - XPACK_REPORTING_ENCRYPTIONKEY=${ENCRYPTION_KEY}
    mem_limit: ${KB_MEM_LIMIT}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -I --cacert /usr/share/kibana/config/certs/ca/ca.crt https://localhost:5601 | grep -q 'HTTP/1.1 302 Found'",
        ]
      interval: 5s
      timeout: 10s
      retries: 1200

  filebeat01:
    profiles: [ elk ]
    depends_on:
      es01:
        condition: service_healthy
    image: docker.elastic.co/beats/filebeat:${STACK_VERSION}
    user: root
    volumes:
      - elkcerts:/usr/share/filebeat/certs
      - filebeatdata01:/usr/share/filebeat/data
      - "./docker/elk/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    environment:
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ELASTIC_HOSTS=https://es01:9200
      - KIBANA_HOSTS=https://kibana:5601
      - LOGSTASH_HOSTS=http://logstash01:9600
    command:
      - --strict.perms=false

  logstash01:
    profiles: [ elk ]
    depends_on:
      es01:
        condition: service_healthy
      kibana:
        condition: service_healthy
    image: docker.elastic.co/logstash/logstash:${STACK_VERSION}
    labels:
      co.elastic.logs/module: logstash
    user: root
    ports:
      - "5044:5044"
    volumes:
      - elkcerts:/usr/share/logstash/certs
      - logstashdata01:/usr/share/logstash/data
      - "./docker/elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro"
    environment:
      - xpack.monitoring.enabled=false
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ELASTIC_HOSTS=https://es01:9200

  heartbeat01:
    profiles: [ elk ]
    depends_on:
      es01:
        condition: service_healthy
      kibana:
        condition: service_healthy
    image: docker.elastic.co/beats/heartbeat:${STACK_VERSION}
    user: root
    volumes:
      - elkcerts:/usr/share/heartbeat/certs
      - heartbeatdata01:/usr/share/heartbeat/data
      - "./docker/elk/heartbeat.yml:/usr/share/heartbeat/heartbeat.yml:ro"
    environment:
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ELASTIC_HOSTS=https://es01:9200
      - KIBANA_HOSTS=https://kibana:5601
    command:
      - --strict.perms=false
    healthcheck:
      test: [ "CMD-SHELL", "curl -s -I --cacert /usr/share/heartbeat/certs/ca/ca.crt https://kibana:5601 | grep -q 'HTTP/1.1'" ]
      interval: 10s
      timeout: 10s
      retries: 120

networks:
  flatland-benchmarks:

volumes:
  orchestrator-data:
  orchestrator-scenarios:
  flatland-benchmarks-keycloak:
  flatland-benchmarks-pgadmin:
  flatland-benchmarks-postgres:
  flatland3-benchmarks-data:
  flatland3-benchmarks-scenarios:

  elkcerts:
    driver: local
  esdata01:
    driver: local
  kibanadata:
    driver: local
  filebeatdata01:
    driver: local
  logstashdata01:
    driver: local
  heartbeatdata01:
    driver: local
