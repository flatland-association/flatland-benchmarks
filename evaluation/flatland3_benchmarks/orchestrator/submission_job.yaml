apiVersion: batch/v1
kind: Job
metadata:
  labels: { } # INSERTED
  annotations: { }
  name: f3-sub
spec:
  # https://kubernetes.io/docs/concepts/workloads/controllers/job/
  # do not back off
  backoffLimit: 0
  template:
    metadata:
      labels: { } # INSERTED
    spec:
      # https://kubernetes.io/docs/concepts/workloads/controllers/job/#handling-pod-and-container-failures
      # https://kubernetes.io/docs/concepts/workloads/controllers/job/#pod-backoff-failure-policy
      activeDeadlineSeconds: 7200
      # do not restart
      restartPolicy: Never
      containers:
        - name: f3-submission
          image: INSERTED
          imagePullPolicy: Always
          imagePullSecrets:
            - name: default-secret
          args: [ ] # INSERTED
          volumeMounts:
            - name: pvc-submissions
              mountPath: /data
              subPath: # INSERTED /<submission_id> in the pvc mounted as /data/<submission_id>
            - name: environments
              mountPath: /tmp/environments
          resources:
            requests:
              memory: "1Gi"
              cpu: "1"
            limits:
              memory: "2Gi"
              cpu: "2"
      initContainers:
        - name: extract-environments
          args:
            - -c
            - |
              set -euxo pipefail
              find /tmp
              unzip /tmp/environments_zip/${ENVIRONMENTS_ZIP} -d /tmp/environments/
              find /tmp
              ls -al /data
              # /<submission_id>/<test_id>/<scenario_id> in the pvc mounted under /data:
              mkdir -p ${DATA_DIR}
              ls -al /data
          command:
            - sh
          env: [ ] # INSERTED
          image: busybox
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - mountPath: /tmp/environments
              name: environments
            - name: pvc-submissions
              mountPath: /data
            - name: pvc-environments
              mountPath: /tmp/environments_zip
      volumes:
        - emptyDir: { }
          name: environments
        - name: pvc-submissions
          persistentVolumeClaim:
            claimName: # INSERTED
        - name: pvc-environments
          persistentVolumeClaim:
            claimName: # INSERTED

